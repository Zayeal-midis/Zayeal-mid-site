<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me - Zayeal Site</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <style>
    body {
      background-image: url('background.jpg');
      background-size: cover;
      background-repeat: no-repeat;
    }

    .about-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .profile-section {
      background: linear-gradient(135deg, rgba(43, 43, 43, 0.9), rgba(58, 58, 58, 0.9));
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      margin: 30px 0;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .profile-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .profile-section:hover::before {
      opacity: 1;
    }

    .profile-info {
      position: relative;
      z-index: 1;
    }

    .profile-info h2 {
      color: #ffffff;
      margin-bottom: 25px;
      font-size: 2.2rem;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 30px 0;
      text-align: left;
    }

    .info-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .info-item:hover {
      transform: translateY(-5px);
      background: rgba(0, 0, 0, 0.5);
      border-color: rgba(102, 126, 234, 0.4);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
      min-height: 100px;
      width: 95%;
      margin: 0 auto;
    }

    .info-label {
      color: #667eea;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 8px;
      display: block;
    }

    .info-value {
      color: #ffffff;
      font-size: 1rem;
      line-height: 1.6;
    }

    .birthday-special {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
      border-color: rgba(102, 126, 234, 0.4);
    }

    .interests-section {
      background: linear-gradient(135deg, rgba(43, 43, 43, 0.9), rgba(58, 58, 58, 0.9));
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      margin: 30px 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .interests-section h3 {
      color: #ffffff;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .interests-list {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    .interest-tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .interest-tag:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    @media (max-width: 768px) {
      .about-container {
        padding: 0 15px;
      }

      .profile-section {
        padding: 25px;
        margin: 20px 0;
      }

      .info-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .profile-info h2 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="soundfonts.html">My Soundfonts</a>
    <a href="midis.html">MIDIs</a>
    <a href="aboutme.html">About Me</a>
  </nav>

        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">🌍 Location</span>

          <div class="info-item birthday-special">

          </div>

          <div class="info-item">
            <span class="info-label">🎨 Favorite Color</span>
            <span class="info-value">Blue 💙</span>

          <div class="info-item">

          </div>

          <div class="info-item">

    <div class="interests-section">

      <div class="interests-list">
        <span class="interest-tag">Gaming</span>

        <span class="interest-tag">Black MIDI</span>
      </div>
    </div>
  </div>
  <footer>
    <p>Copyright © 2025 Zayeal.mid</p>
  </footer>
</body>

</html>
